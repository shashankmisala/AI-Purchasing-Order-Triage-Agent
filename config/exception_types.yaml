# Exception taxonomy and rule thresholds.
# Per the PRD's extensibility requirement, new exception types can be added here
# without touching code -- src/rules.py and src/classifier.py read this file.

exception_types:
  price_variance:
    label: "Price Variance"
    default_severity: HIGH
    description: "Invoice price differs from PO by more than the configured threshold."
    frequency_weight: 0.35
    rule:
      kind: price_variance_pct
      threshold_pct: 0.5          # >0.5% delta triggers the exception

  quantity_mismatch:
    label: "Quantity Mismatch"
    default_severity: HIGH
    description: "Goods received quantity does not match quantity ordered on the PO."
    frequency_weight: 0.25
    rule:
      kind: quantity_mismatch

  duplicate_po:
    label: "Duplicate PO"
    default_severity: MEDIUM
    description: "Same vendor, amount, and date within a short window -- likely a duplicate entry."
    frequency_weight: 0.15
    rule:
      kind: duplicate_window
      window_days: 5

  missing_fields:
    label: "Missing Fields"
    default_severity: MEDIUM
    description: "A required field (vendor ID, GL code, delivery date) is blank."
    frequency_weight: 0.15
    rule:
      kind: missing_fields
      required_fields: [vendor_id, gl_code, delivery_date]

  terms_conflict:
    label: "Terms Conflict"
    default_severity: LOW
    description: "Payment terms on the invoice differ from the contracted terms."
    frequency_weight: 0.10
    rule:
      kind: terms_conflict

# Severity -> urgency score band, used by src/scorer.py
severity_bands:
  HIGH: [7, 10]
  MEDIUM: [4, 6]
  LOW: [1, 3]

# Confidence below this triggers mandatory human review (FR-4).
human_review_confidence_threshold: 0.75

# Allowed disposition actions (FR-4).
actions:
  - Approve
  - Escalate to Manager
  - Reject Invoice
  - Request Vendor Clarification
